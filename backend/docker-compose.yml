services:
  scheduling-api:
    image: ${SCHEDULING_API_IMAGE:-scheduling-api:staging}
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-staging}
        APP_REVISION: ${APP_REVISION:-local}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: scheduling-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # SQLite persistent data. Rollback must keep schema compatibility in mind.
      - sqlite_data:/app/data
      # Optional env file.
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/scheduling.db
      - READ_DB_PATH=${READ_DB_PATH:-/app/data/scheduling.db}
      - APP_VERSION=${APP_VERSION:-staging}
      - DEPLOY_CHANNEL=${DEPLOY_CHANNEL:-staging}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlite_data:
    driver: local
