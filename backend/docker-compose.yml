version: '3.8'

services:
  scheduling-api:
    build: .
    container_name: scheduling-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # SQLite 数据库持久化
      - sqlite_data:/app/data
      # 配置文件（可选）
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/scheduling.db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sqlite_data:
    driver: local
