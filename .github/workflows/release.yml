name: release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - stable
      miniapp_version:
        description: Miniapp version used by stable upload
        required: false
        default: 1.0.0
      miniapp_desc:
        description: Miniapp upload description
        required: false
        default: GitHub Actions upload
      backend_action:
        description: Optional backend deploy action
        required: false
        default: none
        type: choice
        options:
          - none
          - deploy
          - rollback
      backend_version:
        description: Backend image version tag for deploy, for example 3.0.4-staging
        required: false
        default: ""
      backend_rollback_image:
        description: Explicit rollback image, for example scheduling-api:3.0.3
        required: false
        default: ""

jobs:
  desktop:
    runs-on: windows-latest
    env:
      APP_ENV: ${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}
      SCHEDULE_ENV: ${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npx electron-builder --win --publish never
      - name: Publish OSS updater feed
        if: ${{ github.event.inputs.channel == 'stable' }}
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_CDN_BASE_URL: ${{ vars.OSS_CDN_BASE_URL }}
          OSS_OBJECT_PREFIX: ${{ vars.OSS_OBJECT_PREFIX }}
        run: npm run publish:oss-feed
      - name: Validate updater feed
        if: ${{ github.event.inputs.channel != 'stable' }}
        env:
          DRY_RUN: "1"
          WRITE_FEED: "1"
        run: npm run publish:oss-feed
      - uses: actions/upload-artifact@v4
        with:
          name: gewu-desktop-${{ github.event.inputs.channel }}
          path: |
            dist/*.exe
            dist/latest.yml

  backend-smoke:
    runs-on: ubuntu-latest
    env:
      APP_ENV: ${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}
      SCHEDULE_ENV: ${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: node -e "process.env.DB_PATH='/tmp/scheduling.db'; const { createApp } = require('./src/app'); const { getInstance } = require('./src/database'); createApp(); const db = getInstance(); console.log(JSON.stringify(db.getSchemaStatus())); console.log('backend smoke ok')"

  backend-gray-deploy:
    runs-on: ubuntu-latest
    needs: backend-smoke
    if: ${{ github.event.inputs.backend_action != 'none' }}
    environment: ${{ github.event.inputs.channel }}
    env:
      BACKEND_DEPLOY_USER: ${{ secrets.BACKEND_DEPLOY_USER || 'root' }}
      BACKEND_DEPLOY_HOST: ${{ secrets.BACKEND_DEPLOY_HOST }}
      BACKEND_DEPLOY_PORT: ${{ vars.BACKEND_DEPLOY_PORT || '22' }}
      BACKEND_REMOTE_PATH: ${{ vars.BACKEND_REMOTE_PATH || '/root/scheduling-backend' }}
      BACKEND_DOCKERFILE: ${{ vars.BACKEND_DOCKERFILE || 'backend/Dockerfile' }}
      BACKEND_BUILD_CONTEXT: ${{ vars.BACKEND_BUILD_CONTEXT || 'backend' }}
      BACKEND_DOCKER_NETWORK: ${{ vars.BACKEND_DOCKER_NETWORK || 'app_default' }}
      BACKEND_DOCKER_VOLUME: ${{ vars.BACKEND_DOCKER_VOLUME || 'scheduling_data' }}
      BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL || 'http://localhost:3001/api/health' }}
      BACKEND_DEPLOY_KEY: ${{ secrets.BACKEND_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate backend deployment inputs
        run: |
          if [ "${{ github.event.inputs.backend_action }}" = "deploy" ] && [ -z "${{ github.event.inputs.backend_version }}" ]; then
            echo "backend_version is required for backend deploy."
            exit 1
          fi
          if [ -z "$BACKEND_DEPLOY_HOST" ]; then
            echo "BACKEND_DEPLOY_HOST is required."
            exit 1
          fi
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$BACKEND_DEPLOY_PORT" "$BACKEND_DEPLOY_HOST" >> ~/.ssh/known_hosts
          if [ -n "$BACKEND_DEPLOY_KEY" ]; then
            umask 077
            printf '%s' "$BACKEND_DEPLOY_KEY" > ~/.ssh/backend_deploy_key
            {
              echo "Host $BACKEND_DEPLOY_HOST"
              echo "  IdentityFile ~/.ssh/backend_deploy_key"
              echo "  StrictHostKeyChecking yes"
            } >> ~/.ssh/config
          fi
      - name: Deploy selected backend version
        if: ${{ github.event.inputs.backend_action == 'deploy' }}
        run: |
          python scripts/docker_deploy_gray.py deploy \
            --host "$BACKEND_DEPLOY_HOST" \
            --user "$BACKEND_DEPLOY_USER" \
            --ssh-port "$BACKEND_DEPLOY_PORT" \
            --remote-path "$BACKEND_REMOTE_PATH" \
            --dockerfile "$BACKEND_DOCKERFILE" \
            --build-context "$BACKEND_BUILD_CONTEXT" \
            --network "$BACKEND_DOCKER_NETWORK" \
            --volume "$BACKEND_DOCKER_VOLUME" \
            --health-url "$BACKEND_HEALTH_URL" \
            --channel "${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}" \
            --revision "${{ github.sha }}" \
            --version "${{ github.event.inputs.backend_version }}"
      - name: Rollback backend
        if: ${{ github.event.inputs.backend_action == 'rollback' }}
        run: |
          python scripts/docker_deploy_gray.py rollback \
            --host "$BACKEND_DEPLOY_HOST" \
            --user "$BACKEND_DEPLOY_USER" \
            --ssh-port "$BACKEND_DEPLOY_PORT" \
            --remote-path "$BACKEND_REMOTE_PATH" \
            --network "$BACKEND_DOCKER_NETWORK" \
            --volume "$BACKEND_DOCKER_VOLUME" \
            --health-url "$BACKEND_HEALTH_URL" \
            --channel "${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}" \
            --revision "${{ github.sha }}" \
            --image "${{ github.event.inputs.backend_rollback_image }}"

  miniapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp
    env:
      WECHAT_APPID: ${{ secrets.WECHAT_APPID || 'wx3d570539bbe6ba1b' }}
      WECHAT_PRIVATE_KEY: ${{ secrets.WECHAT_PRIVATE_KEY }}
      MINIAPP_CHANNEL: ${{ github.event.inputs.channel }}
      MINIAPP_APP_ENV: ${{ github.event.inputs.channel == 'stable' && 'prod' || github.event.inputs.channel }}
      MINIAPP_API_BASE_URL: ${{ github.event.inputs.channel == 'stable' && vars.MINIAPP_API_BASE_URL_PROD || vars.MINIAPP_API_BASE_URL_STAGING }}
      MINIAPP_VERSION: ${{ github.event.inputs.miniapp_version }}
      MINIAPP_DESC: ${{ github.event.inputs.miniapp_desc }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run ci:weapp
      - name: Validate WeChat upload secrets
        run: |
          if [ -z "$WECHAT_APPID" ] || [ -z "$WECHAT_PRIVATE_KEY" ]; then
            echo "WECHAT_APPID and WECHAT_PRIVATE_KEY are required for miniapp upload."
            exit 1
          fi
      - name: Write WeChat private key
        run: |
          umask 077
          printf '%s' "$WECHAT_PRIVATE_KEY" > private.key
      - name: Upload WeChat miniapp
        run: |
          node <<'NODE'
          const ci = require('miniprogram-ci');
          (async () => {
            const channel = process.env.MINIAPP_CHANNEL || 'staging';
            const appid = process.env.WECHAT_APPID;
            const version = process.env.MINIAPP_VERSION || require('./package.json').version;
            const desc = process.env.MINIAPP_DESC || `GitHub Actions ${channel}`;
            const project = new ci.Project({
              appid,
              type: 'miniProgram',
              projectPath: process.cwd(),
              privateKeyPath: './private.key',
              ignores: ['node_modules/**/*']
            });

            if (channel === 'stable') {
              await ci.upload({
                project,
                version,
                desc,
                setting: {
                  es6: true,
                  minify: true,
                  codeProtect: true,
                  minifyJS: true,
                  minifyWXML: true,
                  minifyWXSS: true,
                  autoPrefixWXSS: true
                },
                onProgressUpdate: console.log
              });
              return;
            }

            await ci.preview({
              project,
              desc,
              setting: {
                es6: true,
                minify: false
              },
              qrcodeFormat: 'image',
              qrcodeOutputDest: './preview-qrcode.jpg',
              onProgressUpdate: console.log
            });
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.channel == 'staging' }}
        with:
          name: miniapp-preview-qrcode
          path: miniapp/preview-qrcode.jpg
